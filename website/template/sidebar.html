{% extends "base.html" %}

{% block content %}
<div class="browse-container">

    {% include 'include/sidebar.html' %}


    <main class="browse-main">
        <div class="browse-header">
            <h1 class="browse-title">BROWSE</h1>
            <div class="sort-dropdown">SORT BY FEATURED ▾</div>
        </div>

        <div class="product-grid">
            {% for plant in plants %}
            <a href="{{ url_for('views.descriptionPage', plant_id=plant.id) }}" class="product-card">
                <div class="product-image">
                    <img src="{{ url_for('static', filename='images/' + plant.image) }}" alt="{{ plant.name }}">
                </div>
                <div class="product-info">
                    <span class="product-name">{{ plant.name }}</span>
                    <span class="product-price">${{ "%.2f"|format(plant.price) }}</span>
                    <span class="favorite-icon">♥</span>
                </div>
            </a>
            {% endfor %}
        </div>
    </main>
</div>
{% endblock %}
