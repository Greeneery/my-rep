{% extends "base.html" %}

{% block css %}
{{ super() }}
<link rel="stylesheet"
    href="{{ url_for('static', filename='css/favorites.css') }}" />
<link rel="icon" type="image/x-icon"
    href="{{ url_for('static', filename='css/image/icon/iconGreenery.ico') }}">
<link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
<link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap"
    rel="stylesheet" />
{% endblock %}

{% block content %}

<section class="favorites-page fade-in-bottom">
    <main class="favorite-main">
        <div class="favorite-header">
            <h1 class="favorite-title">FAVORITES</h1>
        </div>

        <div class="product-grid">
            {% for plant in favorites %}
            <a href="{{ url_for('views.detail', plant_id=plant['plantID']) }}"
                class="product-card">
                <div class="product-image">
                    <img
                        src="{{ url_for('static', filename='images/' + plant['imageUrl']) }}"
                        alt="{{ plant['plantName'] }}">
                </div>
                <div class="product-info">
                    <span class="product-name">{{ plant['plantName'] }}</span>
                    <span class="product-price">${{
                        "%.2f"|format(plant['price'])
                        }}</span>
                    <form
                        action="{{ url_for('views.toggle_fav', plant_id=plant['plantID']) }}"
                        method="POST" style="display:inline;">
                        <button type="submit" class="favorite-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" x="0px"
                                y="0px" width="100" height="100"
                                viewBox="0 0 30 30">
                                <path
                                    d="M 14.984375 2.4863281 A 1.0001 1.0001 0 0 0 14 3.5 L 14 4 L 8.5 4 A 1.0001 1.0001 0 0 0 7.4863281 5 L 6 5 A 1.0001 1.0001 0 1 0 6 7 L 24 7 A 1.0001 1.0001 0 1 0 24 5 L 22.513672 5 A 1.0001 1.0001 0 0 0 21.5 4 L 16 4 L 16 3.5 A 1.0001 1.0001 0 0 0 14.984375 2.4863281 z M 6 9 L 7.7929688 24.234375 C 7.9109687 25.241375 8.7633438 26 9.7773438 26 L 20.222656 26 C 21.236656 26 22.088031 25.241375 22.207031 24.234375 L 24 9 L 6 9 z"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </a>
            {% else %}
            <div class="empty-text">
                <h2>Nothing in here!</h2>
                <a class="g-n-f-text" href="{{ url_for('views.browse')}}">Click
                    here to get some!</a>
            </div>
            {% endfor %}
        </div>
    </main>
</section>

{% endblock content %}
