{% extends "base.html" %}

{% block css %}
{{ super() }}
<link rel="stylesheet"
    href="{{ url_for('static', filename='css/home.css') }}" />
<link rel="stylesheet"
    href="{{ url_for('static', filename='css/contact.css')}}" />
<link rel="icon" type="image/x-icon"
    href="{{ url_for('static', filename='css/image/icon/iconGreenery.ico') }}">
<link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
<link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap"
    rel="stylesheet" />
<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet">
{% endblock %}

{% block content %}

<section class="contact-section">
    <div class="contact-container">
        <div class="contact-info">
            <h2>Contact</h2>
            <div class="info-item-container">
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>greenery@contact.info</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Location</h4>
                        <p>Salt Lake, Utah</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Phone No.</h4>
                        <p>(982) 346-6574</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="contact-form">
            <div class="contact-container-nani">
                <form action="https://api.web3forms.com/submit" method="POST"
                    class="contact-left">
                    <div class="contact-left-title">
                        <h2>Having Problems? Tell Us!</h2>
                    </div>
                    <input type="hidden" name="access_key"
                        value="06602ecb-f2d9-42c5-bf3e-30301086ad68">
                    <input type="text" name="name" placeholder="Name"
                        class="contact-input" required>
                    <input type="text" name="email" placeholder="Email"
                        class="contact-input" required>
                    <textarea name="Message" placeholder="Tell us more about the issue."
                        class="contact-input" required></textarea>
                    <div class="holographic-card-2">
                        <button type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
